# ===================================================================
# CCBBD (Cloud Computing and Big Data) Workspace Settings
# ===================================================================
default:
  workspace_path: ".."
  backup_archive: "CCBBD_Backup.zip"

# ===================================================================
# Split Pipelines (CCBBD Course)
# ===================================================================
split:
  ccbbd:
    input_file: "../vault.md"
    output_dir: "../Course"
    zip_name: "../Course.zip"
    default_folder: "Chapter 1 - Introduction to Cloud Computing"
    default_file: "1.1 Cloud Computing Definition and Foundations.md"
    rules:
      - type: "chapter"
        pattern: "^# Chapter (?P<ch_num>\\d+):\\s*(?P<ch_title>.+)$"
        folder_format: "Chapter {ch_num} - {ch_title}"
        file_format: "Chapter_{ch_num}_Intro.md"
      - type: "section"
        pattern: "^## (?P<sec_num>\\d+\\.\\d+)\\.\\s*(?P<sec_title>.+)$"
        file_format: "{sec_num} {sec_title}.md"

# ===================================================================
# Merge Pipelines (CCBBD Course)
# ===================================================================
merge:
  ccbbd:
    input_file: "vault.md"
    workspace_path: "."
    backup_zip: "CCBBD_Backup.zip"
    merge_mode: "overwrite"
    conflict_suffix: " (Vault 1)"

